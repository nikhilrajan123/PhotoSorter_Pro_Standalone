name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade "buildozer" "cython<3.0.0" "virtualenv"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Patch and Build APK
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.home=$JAVA_HOME" > ~/.gradle/gradle.properties
          
          # Step 1: Initialize build environment (downloads python-for-android into .buildozer directory)
          buildozer android update || true
          
          # Step 2: Aggressively patch the hidden internal Gradle templates to use mavenCentral
          find .buildozer/ -name "*.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          find .buildozer/ -name "build.tmpl.gradle" -exec sed -i 's/google()/google()\n        mavenCentral()/g' {} +
          
          # Step 3: Execute final build
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter_Pro_Standalone.apk
          path: bin/*.apk
