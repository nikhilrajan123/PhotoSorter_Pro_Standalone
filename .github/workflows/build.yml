name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Static FFmpeg Binary
        run: |
          # Create the bin directory
          mkdir -p bin
          
          # Download a reliable static arm64-v8a ffmpeg build 
          wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz
          
          # Extract only the ffmpeg executable and rename it to libffmpeg.so
          # (Android only allows executing binaries if they are packaged as .so libraries!)
          tar -xf ffmpeg-release-arm64-static.tar.xz
          mv ffmpeg-*-arm64-static/ffmpeg bin/libffmpeg.so
          
          # Clean up
          rm -rf ffmpeg-release-arm64-static.tar.xz ffmpeg-*-arm64-static/

      - name: Setup Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter_Pro_Standalone.apk
          path: ${{ steps.buildozer.outputs.filename }}
