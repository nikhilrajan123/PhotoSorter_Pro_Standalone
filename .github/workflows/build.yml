name: Build Standalone APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Static FFmpeg Binary
        run: |
          # Create the bin directory
          mkdir -p bin
          
          # Download a reliable static arm64-v8a ffmpeg build 
          wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz
          
          # Extract only the ffmpeg executable and rename it to libffmpeg.so
          # (Android only allows executing binaries if they are packaged as .so libraries!)
          tar -xf ffmpeg-release-arm64-static.tar.xz
          mv ffmpeg-*-arm64-static/ffmpeg bin/libffmpeg.so
          
          # Clean up
          rm -rf ffmpeg-release-arm64-static.tar.xz ffmpeg-*-arm64-static/

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade "buildozer" "cython<3.0.0" "virtualenv"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter_Pro_Standalone.apk
          path: bin/*.apk
